spring.application.name=smart-concierge
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mixc_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=wangsiying
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Redis (optional — app starts even if Redis is down)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT
app.jwt.secret=MixcSmartConciergeJwtSecretKey2025NantongVientianeCityMustBeLongEnough
app.jwt.expiration-ms=86400000

# AES phone encryption
app.crypto.aes-key=MixcPhoneAesKey16

# Deepseek AI key
# 方式1：在本文件填写 y=${DEEPSEEK_API_KKey；方式2：创建 application-local.properties；方式3：PC 系统配置
app.deepseek.api-key=sk-
app.deepseek.base-url=https://api.deepseek.com
app.deepseek.enabled=true
spring.config.import=optional:file:./application-local.properties

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
